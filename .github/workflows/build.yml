name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build for Linux
        run: npm run build:linux

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Imgro-AppImage
          path: dist-v4/*.AppImage

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: Imgro-deb
          path: dist-v4/*.deb

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: Imgro-rpm
          path: dist-v4/*.rpm
