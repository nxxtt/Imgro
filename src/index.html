<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imgro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="lang-selector">
        <select id="lang-select">
          <option value="en">English</option>
          <option value="pt-BR">Português (BR)</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
        </select>
      </div>
      <div class="sidebar-header">
        <h1>Imgro</h1>
      </div>

      <div class="panel">
        <div class="panel-header">File</div>
        <div class="panel-content">
          <button id="btn-select" class="btn btn-primary">
            <span class="icon">📂</span> Abrir Imagem
          </button>
          <div class="file-info" id="file-info">
            <span class="label">Nenhum arquivo selecionado</span>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-dimensions">
        <div class="panel-header">Dimensions</div>
        <div class="panel-content panel-scroll">
          <div class="dimension-row">
            <label>Original:</label>
            <span id="original-dims" class="value">-</span>
          </div>
          <div class="dimension-row">
            <label>New Width:</label>
            <input type="number" id="new-width" class="input" min="1" placeholder="px">
          </div>
          <div class="dimension-row">
            <label>New Height:</label>
            <input type="number" id="new-height" class="input" min="1" placeholder="px">
          </div>
          <div class="ratio-row">
            <label id="ratio-label">Ratio:</label>
            <div class="ratio-buttons" id="ratio-buttons">
              <button class="ratio-btn" data-ratio="16:9">16:9</button>
              <button class="ratio-btn" data-ratio="4:3">4:3</button>
              <button class="ratio-btn" data-ratio="1:1">1:1</button>
              <button class="ratio-btn" data-ratio="3:2">3:2</button>
              <button class="ratio-btn" data-ratio="9:16">9:16</button>
              <button class="ratio-btn" data-ratio="21:9">21:9</button>
              <button class="ratio-btn" data-ratio="original">Original</button>
            </div>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-info">
        <div class="panel-header">Information</div>
        <div class="panel-content panel-scroll">
          <div class="dimension-row">
            <label>Format:</label>
            <span id="format-info" class="value">-</span>
          </div>
          <div class="dimension-row quality-row" id="quality-row" style="display: none;">
            <label id="quality-label">Quality:</label>
            <div class="quality-control">
              <input type="range" id="quality-slider" class="quality-slider" min="1" max="100" value="90">
              <span id="quality-value" class="quality-value">90%</span>
            </div>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-batch">
        <div class="panel-header" id="batch-header">Batch</div>
        <div class="panel-content panel-scroll" style="max-height: 280px;">
          <div class="batch-actions">
            <button id="btn-add-files" class="btn btn-small" style="flex:1;">+ Add</button>
            <button id="btn-select-folder" class="btn btn-small" style="flex:1;">Folder</button>
            <button id="btn-clear-batch" class="btn btn-small btn-secondary" style="flex:1;">Clear</button>
          </div>
          <div class="batch-folder" id="batch-folder">No folder selected</div>
          <div class="batch-files-info" id="batch-files-info">0 files</div>
          <div class="batch-files-list" id="batch-files-list" style="max-height: 60px;"></div>
          <div class="batch-settings">
            <div class="dimension-row" style="margin-bottom:4px;">
              <label id="batch-width-label">W:</label>
              <input type="number" id="batch-width" class="input" style="width:60px;" min="1" value="800" placeholder="px">
            </div>
            <div class="dimension-row" style="margin-bottom:4px;">
              <label id="batch-height-label">H:</label>
              <input type="number" id="batch-height" class="input" style="width:60px;" min="1" value="600" placeholder="px">
            </div>
            <div class="batch-quality" style="margin-top:4px;">
              <label id="batch-quality-label">Q:</label>
              <input type="range" id="batch-quality" class="quality-slider" style="width:60px;" min="1" max="100" value="90">
              <span id="batch-quality-value">90%</span>
            </div>
          </div>
          <button id="btn-process-batch" class="btn btn-success" style="margin-top:8px;" disabled>
            Process All
          </button>
          <div class="batch-progress" id="batch-progress" style="display: none;">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <span class="progress-text" id="progress-text">0/0</span>
          </div>
        </div>
      </div>

      <div class="sidebar-actions">
        <button id="btn-resize" class="btn btn-success" disabled>
          <span class="icon">✓</span> Resize
        </button>
        <button id="btn-clear" class="btn btn-secondary">
          <span class="icon">↺</span> Limpar
        </button>
      </div>

      <div class="status-bar">
        <span id="status-text"></span>
      </div>
    </aside>

    <main class="main-content">
      <div class="workspace">
        <div class="canvas-area" id="canvas-area">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">🖼️</div>
            <p>Drag an image or click \"Open Image\"</p>
          </div>
          <img id="preview-image" class="preview-image hidden">
        </div>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
