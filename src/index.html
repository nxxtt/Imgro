<!DOCTYPE html>
<!--
  Imgro - Image Resizer Application
  Main HTML Structure

  Structure:
  - Language selector (top)
  - Application title
  - Sidebar with collapsible panels
  - Main workspace area for image preview
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imgro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Main Application Container -->
  <div class="app-container">
    <!-- Sidebar: Contains all control panels -->
    <aside class="sidebar">
      <!-- Language Selector: 7 languages supported -->
      <div class="lang-selector">
        <select id="lang-select">
          <option value="en">English</option>
          <option value="pt-BR">Português (BR)</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
        </select>
      </div>
      <!-- Application Title -->
      <div class="sidebar-header">
        <h1>Imgro</h1>
      </div>

      <!-- File Panel: Image selection -->
      <div class="panel">
        <div class="panel-header"><span class="panel-icon">📁</span> File</div>
        <div class="panel-content">
          <button id="btn-select" class="btn btn-primary">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg> <span class="btn-text"></span>
          </button>
          <div class="file-info" id="file-info">
            <span class="label">Nenhum arquivo selecionado</span>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-dimensions">
        <div class="panel-header"><span class="panel-icon">📐</span> Dimensions</div>
        <div class="panel-content panel-scroll">
          <div class="dimension-row">
            <label>Original:</label>
            <span id="original-dims" class="value">-</span>
          </div>
          <div class="dimension-row">
            <label for="new-width">New Width:</label>
            <input type="number" id="new-width" class="input" min="1" placeholder="px" aria-label="New Width in pixels">
          </div>
          <div class="dimension-row">
            <label for="new-height">New Height:</label>
            <input type="number" id="new-height" class="input" min="1" placeholder="px" aria-label="New Height in pixels">
          </div>
          <div class="ratio-row">
            <label id="ratio-label">Ratio:</label>
            <div class="ratio-buttons" id="ratio-buttons">
              <button class="ratio-btn" data-ratio="16:9">16:9</button>
              <button class="ratio-btn" data-ratio="4:3">4:3</button>
              <button class="ratio-btn" data-ratio="1:1">1:1</button>
              <button class="ratio-btn" data-ratio="3:2">3:2</button>
              <button class="ratio-btn" data-ratio="9:16">9:16</button>
              <button class="ratio-btn" data-ratio="21:9">21:9</button>
              <button class="ratio-btn" data-ratio="original">Original</button>
            </div>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-info">
        <div class="panel-header"><span class="panel-icon">ℹ️</span> Information</div>
        <div class="panel-content panel-scroll">
          <div class="dimension-row">
            <label>Format:</label>
            <span id="format-info" class="value">-</span>
          </div>
          <div class="format-row">
            <label>Output:</label>
            <select id="output-format">
              <option value="original" data-label="Original">Original</option>
              <option value="PNG" data-label="PNG">PNG</option>
              <option value="JPEG" data-label="JPG">JPG</option>
              <option value="WEBP" data-label="WEBP">WEBP</option>
              <option value="BMP" data-label="BMP">BMP</option>
            </select>
          </div>
          <div class="dimension-row quality-row" id="quality-row" style="display: none;">
            <label id="quality-label">Quality:</label>
            <div class="quality-control">
              <input type="range" id="quality-slider" class="quality-slider" min="1" max="100" value="90">
              <span id="quality-value" class="quality-value">90%</span>
            </div>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-transform">
        <div class="panel-header" id="transform-header"><span class="panel-icon">🔄</span> Transform</div>
        <div class="panel-content">
          <div class="transform-buttons">
            <button id="btn-rotate-left" class="btn btn-small transform-btn" title="Rotate Left (Ctrl+E)" aria-label="Rotate image left">
              <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            </button>
            <button id="btn-rotate-right" class="btn btn-small transform-btn" title="Rotate Right (Ctrl+E)" aria-label="Rotate image right">
              <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
            </button>
            <button id="btn-flip-h" class="btn btn-small transform-btn" title="Flip Horizontal" aria-label="Flip image horizontally">
              <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M12 22V2"/><path d="M21 8L3 8"/></svg>
            </button>
            <button id="btn-flip-v" class="btn btn-small transform-btn" title="Flip Vertical" aria-label="Flip image vertically">
              <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 16v5h5"/><path d="M3 8V3h5"/><path d="M2 12h20"/><path d="M8 21v-18"/></svg>
            </button>
            <button id="btn-reset-transform" class="btn btn-small btn-secondary" title="Reset" aria-label="Reset transformations">
              <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="panel" id="panel-filters">
        <div class="panel-header" id="filters-header"><span class="panel-icon">🎨</span> Filters</div>
        <div class="panel-content panel-scroll">
          <div class="filter-row">
            <label id="brightness-label">Brightness</label>
            <input type="range" id="filter-brightness" class="filter-slider" min="0" max="200" value="100">
            <span id="brightness-value">100%</span>
          </div>
          <div class="filter-row">
            <label id="contrast-label">Contrast</label>
            <input type="range" id="filter-contrast" class="filter-slider" min="0" max="200" value="100">
            <span id="contrast-value">100%</span>
          </div>
          <div class="filter-row">
            <label id="saturation-label">Saturation</label>
            <input type="range" id="filter-saturation" class="filter-slider" min="0" max="200" value="100">
            <span id="saturation-value">100%</span>
          </div>
          <div class="filter-row">
            <label id="grayscale-label">Grayscale</label>
            <input type="range" id="filter-grayscale" class="filter-slider" min="0" max="100" value="0">
            <span id="grayscale-value">0%</span>
          </div>
          <button id="btn-reset-filters" class="btn btn-small btn-secondary" style="margin-top:8px; width:100%;">Reset</button>
        </div>
      </div>

<div class="panel" id="panel-batch">
        <div class="panel-header" id="batch-header"><span class="panel-icon">📚</span> Batch</div>
        <div class="panel-content panel-scroll batch-panel-content" style="max-height: 280px;">
          <div class="batch-actions">
            <button id="btn-add-files" class="btn btn-small" style="flex:1;">+ Add</button>
            <button id="btn-select-folder" class="btn btn-small" style="flex:1;">Folder</button>
            <button id="btn-clear-batch" class="btn btn-small btn-secondary" style="flex:1;">Clear</button>
          </div>
          <div class="batch-folder" id="batch-folder">No folder selected</div>
          <div class="batch-files-info" id="batch-files-info">0 files</div>
          <div class="batch-files-list" id="batch-files-list" style="max-height: 60px;"></div>
          <div class="batch-settings">
            <div class="dimension-row" style="margin-bottom:4px;">
              <label for="batch-width" id="batch-width-label">W:</label>
              <input type="number" id="batch-width" class="input" style="width:60px;" min="1" value="800" placeholder="px" aria-label="Batch resize width">
            </div>
            <div class="dimension-row" style="margin-bottom:4px;">
              <label for="batch-height" id="batch-height-label">H:</label>
              <input type="number" id="batch-height" class="input" style="width:60px;" min="1" value="600" placeholder="px" aria-label="Batch resize height">
            </div>
            <div class="batch-quality" style="margin-top:4px;">
              <label id="batch-quality-label">Q:</label>
              <input type="range" id="batch-quality" class="quality-slider" style="width:60px;" min="1" max="100" value="90">
              <span id="batch-quality-value">90%</span>
            </div>
          </div>
          <button id="btn-process-batch" class="btn btn-success" style="margin-top:8px;" disabled>
            Process All
          </button>
          <div class="batch-progress" id="batch-progress" style="display: none;">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <span class="progress-text" id="progress-text">0/0</span>
          </div>
        </div>
      </div>

      <div class="sidebar-actions">
        <button id="btn-resize" class="btn btn-success" disabled>
          <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> <span class="btn-text">Resize</span>
        </button>
        <button id="btn-clear" class="btn btn-secondary">
          <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> <span class="btn-text">Limpar</span>
        </button>
      </div>

      <div class="status-bar">
        <span id="status-text"></span>
      </div>
    </aside>

    <main class="main-content">
      <div class="workspace" id="workspace">
        <div class="zoom-controls">
          <button id="btn-zoom-out" class="zoom-btn" title="Zoom Out">−</button>
          <span id="zoom-level">100%</span>
          <button id="btn-zoom-in" class="zoom-btn" title="Zoom In">+</button>
          <button id="btn-zoom-fit" class="zoom-btn" title="Fit to Window">⊡</button>
        </div>
        <div class="canvas-area" id="canvas-area">
<div class="empty-state" id="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <p>Drag an image or click "Open Image"</p>
          </div>
          <img id="preview-image" class="preview-image hidden" alt="Image preview">
          <div class="loading-spinner" id="loading-spinner">
            <div class="spinner"></div>
            <span>Processing...</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
