<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redimensionador de Imagens</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Redimensionar</h1>
      </div>

      <div class="panel">
        <div class="panel-header">Arquivo</div>
        <div class="panel-content">
          <button id="btn-select" class="btn btn-primary">
            <span class="icon">📂</span> Abrir Imagem
          </button>
          <div class="file-info" id="file-info">
            <span class="label">Nenhum arquivo selecionado</span>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Dimensões</div>
        <div class="panel-content">
          <div class="dimension-row">
            <label>Original:</label>
            <span id="original-dims" class="value">-</span>
          </div>
          <div class="dimension-row">
            <label>Nova Largura:</label>
            <input type="number" id="new-width" class="input" min="1" placeholder="px">
          </div>
          <div class="dimension-row">
            <label>Nova Altura:</label>
            <input type="number" id="new-height" class="input" min="1" placeholder="px">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Informações</div>
        <div class="panel-content">
          <div class="dimension-row">
            <label>Formato:</label>
            <span id="format-info" class="value">-</span>
          </div>
        </div>
      </div>

      <div class="sidebar-actions">
        <button id="btn-resize" class="btn btn-success" disabled>
          <span class="icon">✓</span> Redimensionar
        </button>
        <button id="btn-clear" class="btn btn-secondary">
          <span class="icon">↺</span> Limpar
        </button>
      </div>

      <div class="status-bar">
        <span id="status-text"></span>
      </div>
    </aside>

    <main class="main-content">
      <div class="workspace">
        <div class="canvas-area" id="canvas-area">
          <div class="empty-state">
            <div class="empty-icon">🖼️</div>
            <p>Arraste uma imagem ou clique em "Abrir Imagem"</p>
          </div>
          <img id="preview-image" class="preview-image hidden">
        </div>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
